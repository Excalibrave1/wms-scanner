<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WMS Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0a0f1e; --surface:#111827; --border:#1e2d40;
  --primary:#00d4ff; --success:#00e5a0; --danger:#ff4d6d; --warn:#ffb830;
  --text:#e2e8f0; --muted:#64748b;
  --font:'DM Mono','Courier New',monospace;
}
html,body { height:100%;width:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased }
@keyframes scanline { 0%{top:10%;opacity:1}45%{opacity:1}50%{top:90%;opacity:.4}55%{opacity:1}100%{top:10%;opacity:1} }
@keyframes cornerPulse { 0%,100%{opacity:1}50%{opacity:.4} }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
@keyframes ripple { 0%{transform:scale(.8);opacity:1}100%{transform:scale(2.4);opacity:0} }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
@keyframes successPop { 0%{transform:scale(.7);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1} }
@keyframes spin { to{transform:rotate(360deg)} }
.app { display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative }
.header { padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;z-index:10 }
.header-brand { display:flex;align-items:center;gap:10px }
.header-icon { width:32px;height:32px;background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.3);border-radius:8px;display:flex;align-items:center;justify-content:center }
.header-icon svg { width:16px;height:16px }
.header-title { font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:var(--primary);letter-spacing:.5px }
.header-sub { font-size:10px;color:var(--muted);margin-top:1px }
.status-dot { width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s }
.status-dot.active { background:var(--success);animation:blink 1.5s infinite }
.status-dot.success { background:var(--success) }
.status-dot.error { background:var(--danger) }
.cam-area { flex:1;position:relative;overflow:hidden;background:#000 }
#reader { width:100%!important;height:100%!important }
#reader video { width:100%!important;height:100%!important;object-fit:cover!important }
#reader img { display:none!important }
#reader > div:not(:first-child) { display:none!important }
.overlay { position:absolute;inset:0;pointer-events:none;z-index:5 }
.overlay-dark { position:absolute;inset:0;background:rgba(0,0,0,.55) }
.scan-frame { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(72vw,280px);height:min(72vw,280px) }
.frame-clear { position:absolute;inset:0;background:transparent;box-shadow:0 0 0 2000px rgba(0,0,0,.55);border-radius:4px }
.corner { position:absolute;width:24px;height:24px;border-color:var(--primary);border-style:solid;animation:cornerPulse 2s ease-in-out infinite }
.corner.tl { top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0 }
.corner.tr { top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 4px 0 0 }
.corner.bl { bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 4px }
.corner.br { bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0 }
.scanline { position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);top:10%;animation:scanline 2.4s ease-in-out infinite;border-radius:2px }
.scan-label { position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.6);white-space:nowrap;letter-spacing:1px;text-transform:uppercase }
.ripple-wrap { position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:6 }
.ripple-wrap.show { display:flex }
.ripple { width:80px;height:80px;border-radius:50%;border:3px solid var(--success);animation:ripple .6s ease-out forwards }
.bottom { background:var(--surface);border-top:1px solid var(--border);padding:16px 20px 20px;flex-shrink:0;z-index:10 }
.manual-row { display:flex;gap:8px;margin-bottom:14px }
.manual-input { flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:var(--font);font-size:14px;color:var(--text);outline:none;transition:border-color .2s;letter-spacing:1px }
.manual-input:focus { border-color:var(--primary) }
.manual-input::placeholder { color:var(--muted);letter-spacing:0 }
.btn-search { background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.3);border-radius:8px;padding:10px 16px;color:var(--primary);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px }
.btn-search:hover { background:rgba(0,212,255,.2) }
.btn-search:active { transform:scale(.97) }
.result-card { display:none;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px;animation:fadeUp .3s ease-out }
.result-card.show { display:block }
.result-card.success { border-color:rgba(0,229,160,.35);background:rgba(0,229,160,.05) }
.result-card.error { border-color:rgba(255,77,109,.35);background:rgba(255,77,109,.05) }
.result-label { font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px }
.result-id { font-size:22px;font-weight:500;color:var(--success);letter-spacing:2px;margin-bottom:4px }
.result-desc { font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);margin-bottom:2px }
.result-meta { font-size:11px;color:var(--muted) }
.result-error-text { font-size:13px;color:var(--danger) }
.btn-row { display:grid;grid-template-columns:1fr 1fr;gap:10px }
.btn-action { border:none;border-radius:10px;padding:13px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden }
.btn-action:after { content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .15s }
.btn-action:hover:after { opacity:1 }
.btn-action:active { transform:scale(.97) }
.btn-action:disabled { opacity:.4;cursor:not-allowed;transform:none }
.btn-in { background:rgba(0,229,160,.15);border:1px solid rgba(0,229,160,.4);color:var(--success) }
.btn-out { background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.4);color:var(--danger) }
.btn-icon { width:18px;height:18px;display:flex;align-items:center;justify-content:center }
.qty-overlay { display:none;position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:20;align-items:flex-end;justify-content:center;padding:0 }
.qty-overlay.show { display:flex }
.qty-sheet { background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 24px 32px;width:100%;animation:fadeUp .25s ease-out }
.qty-handle { width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 18px }
.qty-title { font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px }
.qty-title.in-color { color:var(--success) }
.qty-title.out-color { color:var(--danger) }
.qty-sub { font-size:11px;color:var(--muted);margin-bottom:18px }
.qty-input { width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:var(--font);font-size:28px;font-weight:500;color:var(--text);text-align:center;letter-spacing:3px;outline:none;margin-bottom:12px;transition:border-color .2s }
.qty-input:focus { border-color:var(--primary) }
.pic-input { width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;margin-bottom:16px;transition:border-color .2s }
.pic-input:focus { border-color:var(--primary) }
.pic-input::placeholder { color:var(--muted) }
.qty-confirm { width:100%;border:none;border-radius:10px;padding:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px }
.qty-confirm:active { transform:scale(.98) }
.qty-confirm.in-btn { background:var(--success);color:#0a1a10 }
.qty-confirm.out-btn { background:var(--danger);color:#1a080d }
.qty-cancel { width:100%;background:transparent;border:none;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;margin-top:4px }
.qty-cancel:hover { color:var(--text) }
.toast-wrap { position:absolute;top:70px;left:50%;transform:translateX(-50%);z-index:30;display:flex;flex-direction:column;gap:8px;width:calc(100% - 40px);pointer-events:none }
.toast { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:13px;display:flex;align-items:center;gap:10px;animation:fadeUp .3s ease-out }
.toast.s { border-color:rgba(0,229,160,.4);color:var(--success) }
.toast.e { border-color:rgba(255,77,109,.4);color:var(--danger) }
.toast.w { border-color:rgba(255,184,48,.4);color:var(--warn) }
.loading-overlay { display:none;position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:25;align-items:center;justify-content:center;flex-direction:column;gap:12px }
.loading-overlay.show { display:flex }
.spinner { width:36px;height:36px;border:3px solid rgba(0,212,255,.2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite }
.loading-text { font-size:12px;color:var(--primary);letter-spacing:1px;text-transform:uppercase }
.success-flash { display:none;position:absolute;inset:0;background:rgba(0,229,160,.08);z-index:7;align-items:center;justify-content:center;animation:successPop .5s ease-out }
.success-flash.show { display:flex }
.success-check { width:80px;height:80px;background:rgba(0,229,160,.15);border:2px solid var(--success);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px }
.cam-error { display:none;position:absolute;inset:0;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center;padding:40px;z-index:4 }
.cam-error.show { display:flex }
.cam-error-icon { font-size:48px;opacity:.4 }
.cam-error-text { font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted);line-height:1.5 }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-brand">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round">
          <path d="M3 5h4M3 9h4M3 13h4M3 17h4M11 5h2M11 9h2M11 13h2M11 17h2M17 5h4M17 9h4M17 13h4M17 17h4"/>
        </svg>
      </div>
      <div>
        <div class="header-title">WMS SCANNER</div>
        <div class="header-sub">Warehouse Material System</div>
      </div>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- CAMERA -->
  <div class="cam-area">
    <div id="reader"></div>

    <div class="overlay">
      <div class="overlay-dark"></div>
      <div class="scan-frame">
        <div class="frame-clear"></div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="scanline"></div>
        <div class="scan-label">Arahkan ke Barcode / QR Code</div>
      </div>
    </div>

    <div class="ripple-wrap" id="rippleWrap"><div class="ripple"></div></div>

    <div class="success-flash" id="successFlash">
      <div class="success-check">&#10003;</div>
    </div>

    <div class="cam-error" id="camError">
      <div class="cam-error-icon">&#128247;</div>
      <div class="cam-error-text" id="camErrorText">Izinkan akses kamera untuk mulai scan</div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">Memproses...</div>
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom">
    <div class="manual-row">
      <input type="text" class="manual-input" id="manualInput"
        placeholder="Ketik ID Roll..."
        autocomplete="off" autocorrect="off" spellcheck="false"
        onkeydown="if(event.key==='Enter') manualSearch()">
      <button class="btn-search" onclick="manualSearch()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        Cari
      </button>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-label" id="resultLabel">Roll ditemukan</div>
      <div class="result-id"   id="resultId">-</div>
      <div class="result-desc" id="resultDesc">-</div>
      <div class="result-meta" id="resultMeta">-</div>
    </div>

    <div class="btn-row" id="btnRow" style="display:none">
      <button class="btn-action btn-in" onclick="openQty('IN')">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        </div>
        MATERIAL IN
      </button>
      <button class="btn-action btn-out" onclick="openQty('OUT')">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </div>
        MATERIAL OUT
      </button>
    </div>
  </div>

  <!-- QTY BOTTOM SHEET -->
  <div class="qty-overlay" id="qtyOverlay" onclick="if(event.target===this) closeQty()">
    <div class="qty-sheet">
      <div class="qty-handle"></div>
      <div class="qty-title" id="qtyTitle">Material IN</div>
      <div class="qty-sub"   id="qtySub">Masukkan jumlah yang diterima</div>
      <input type="number" class="qty-input" id="qtyInput" placeholder="0" min="1" inputmode="numeric">
      <input type="text"   class="pic-input" id="picInput" placeholder="Nama PIC / penanggung jawab">
      <button class="qty-confirm" id="qtyConfirm" onclick="confirmTransaction()">Konfirmasi IN</button>
      <button class="qty-cancel"  onclick="closeQty()">Batal</button>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>
</div>

<script>
// ============================================================
// KONFIGURASI — ganti dengan URL Apps Script Anda
// Contoh: 'https://script.google.com/macros/s/AKfycb.../exec'
// ============================================================
const WMS_URL = 'https://script.google.com/macros/s/AKfycbxLf5XwYyPuXPbQ5ojUruWaN0l0WyDGOIbew1I7Gz7ojISAasDFcvm5JuXkg1lSC5EJ8Q/exec';

// ============================================================
// STATE
// ============================================================
let html5qr    = null;
let isScanning = false;
let foundRoll  = null;
let pendingTipe = null;

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', startCamera);

// ============================================================
// KAMERA
// ============================================================
function startCamera() {
  setStatus('');
  html5qr = new Html5Qrcode('reader', { verbose: false });

  const config = {
    fps: 15,
    qrbox: (w, h) => {
      const s = Math.min(w, h) * 0.65;
      return { width: s, height: s };
    },
    aspectRatio: window.innerHeight / window.innerWidth,
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8
    ]
  };

  html5qr.start(
    { facingMode: 'environment' },
    config,
    onScanSuccess,
    () => {}
  )
  .then(() => {
    isScanning = true;
    setStatus('active');
    hideCamError();
    setTimeout(cleanReaderUI, 200);
  })
  .catch(err => {
    showCamError(
      err.toString().includes('Permission')
        ? 'Akses kamera ditolak.\n\nBuka Settings browser, izinkan kamera, lalu refresh.'
        : 'Kamera tidak tersedia.\n\nGunakan input manual di bawah.'
    );
    setStatus('error');
  });
}

function cleanReaderUI() {
  const reader = document.getElementById('reader');
  if (!reader) return;
  Array.from(reader.children).forEach(el => {
    if (el.tagName !== 'VIDEO') el.style.display = 'none';
  });
}

// ── Hasil scan dari kamera ────────────────────────────────────
function onScanSuccess(decoded) {
  if (!isScanning) return;
  if (navigator.vibrate) navigator.vibrate([60, 30, 60]);
  showRipple();
  setStatus('active');

  // Code128 dari Zebra → langsung ID angka (misal "42")
  // Backward compatible: jika masih format lama "42|RM-001|Desc"
  let query = decoded.trim();
  if (query.includes('|')) query = query.split('|')[0].trim();

  searchRoll(query);
}

function showRipple() {
  const rw = document.getElementById('rippleWrap');
  rw.classList.add('show');
  setTimeout(() => rw.classList.remove('show'), 700);
}

function showSuccessFlash() {
  const sf = document.getElementById('successFlash');
  sf.classList.add('show');
  setTimeout(() => sf.classList.remove('show'), 1200);
}

function showCamError(msg) {
  document.getElementById('camError').classList.add('show');
  document.getElementById('camErrorText').textContent = msg;
}
function hideCamError() {
  document.getElementById('camError').classList.remove('show');
}

// ============================================================
// SEARCH ROLL — pakai URL parameter (Apps Script doGet)
// ============================================================
function manualSearch() {
  const val = document.getElementById('manualInput').value.trim();
  if (!val) { showToast('Masukkan ID Roll', 'w'); return; }
  // Backward compat: jika user paste format lama dengan |
  const query = val.includes('|') ? val.split('|')[0].trim() : val;
  searchRoll(query);
}

function searchRoll(query) {
  // Cegah double-scan saat sedang loading
  if (document.getElementById('loadingOverlay').classList.contains('show')) return;

  showLoading('Mencari roll...');

  // Demo mode jika WMS_URL belum diset
  if (WMS_URL === 'GANTI_DENGAN_URL_APPS_SCRIPT_ANDA') {
    setTimeout(() => {
      hideLoading();
      foundRoll = {
        idno_rollawal: query,
        item_code:     'DEMO-001',
        deskripsi:     'Material Demo (WMS_URL belum diset)',
        no_rollawal:   'ROLL-' + query,
        stok_saat_ini: 100,
        size_mtrl:     '100x50',
        lot_mtrl:      'LOT-A'
      };
      showResult(foundRoll);
      showToast('Mode demo — set WMS_URL di scanner.html', 'w');
    }, 600);
    return;
  }

  // Fetch ke Apps Script via URL parameter
  // Apps Script doGet membaca e.parameter.action dan e.parameter.query
  const url = WMS_URL + '?action=findRoll&query=' + encodeURIComponent(query);

  fetch(url, { method: 'GET', redirect: 'follow' })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      hideLoading();
      if (data && data.success) {
        foundRoll = data.data;
        showResult(data.data);
      } else {
        showResultError(data ? data.message : 'Roll tidak ditemukan');
        foundRoll = null;
      }
    })
    .catch(err => {
      hideLoading();
      console.error('WMS fetch error:', err);
      showResultError('Gagal koneksi ke WMS.\nPeriksa WMS_URL dan koneksi internet.');
    });
}

function showResult(roll) {
  const card = document.getElementById('resultCard');
  card.className = 'result-card show success';
  document.getElementById('resultLabel').textContent = 'Roll ditemukan';
  document.getElementById('resultId').textContent   = '#' + roll.idno_rollawal;
  document.getElementById('resultDesc').textContent = roll.item_code + '  ' + roll.deskripsi;
  document.getElementById('resultMeta').textContent =
    'Stok: ' + roll.stok_saat_ini +
    '  |  Roll: ' + (roll.no_rollawal || '-') +
    '  |  Size: ' + (roll.size_mtrl || '-');
  document.getElementById('btnRow').style.display = 'grid';
}

function showResultError(msg) {
  const card = document.getElementById('resultCard');
  card.className = 'result-card show error';
  document.getElementById('resultLabel').textContent = 'Tidak ditemukan';
  document.getElementById('resultId').textContent    = '';
  document.getElementById('resultDesc').innerHTML    = '<span class="result-error-text">' + msg + '</span>';
  document.getElementById('resultMeta').textContent  = '';
  document.getElementById('btnRow').style.display    = 'none';
}

// ============================================================
// QTY BOTTOM SHEET
// ============================================================
function openQty(tipe) {
  if (!foundRoll) return;
  pendingTipe = tipe;

  const isIn     = tipe === 'IN';
  const title    = document.getElementById('qtyTitle');
  const sub      = document.getElementById('qtySub');
  const confirm  = document.getElementById('qtyConfirm');

  title.textContent   = isIn ? 'Material IN' : 'Material OUT';
  title.className     = 'qty-title ' + (isIn ? 'in-color' : 'out-color');
  sub.textContent     = isIn
    ? 'Jumlah material yang diterima/masuk'
    : 'Jumlah material keluar (stok: ' + foundRoll.stok_saat_ini + ')';
  confirm.textContent = isIn ? 'Konfirmasi IN' : 'Konfirmasi OUT';
  confirm.className   = 'qty-confirm ' + (isIn ? 'in-btn' : 'out-btn');

  document.getElementById('qtyInput').value = '';
  document.getElementById('picInput').value  = '';
  document.getElementById('qtyOverlay').classList.add('show');
  setTimeout(() => document.getElementById('qtyInput').focus(), 200);
}

function closeQty() {
  document.getElementById('qtyOverlay').classList.remove('show');
  pendingTipe = null;
}

function confirmTransaction() {
  const qty = parseFloat(document.getElementById('qtyInput').value) || 0;
  const pic = document.getElementById('picInput').value.trim();

  if (qty <= 0) { showToast('Masukkan jumlah yang valid', 'w'); return; }
  if (!pic)     { showToast('Nama PIC wajib diisi', 'w');       return; }
  if (!foundRoll) return;

  const tipe = pendingTipe;
  closeQty();
  showLoading(tipe === 'IN' ? 'Memproses IN...' : 'Memproses OUT...');

  // Demo mode
  if (WMS_URL === 'GANTI_DENGAN_URL_APPS_SCRIPT_ANDA') {
    setTimeout(() => {
      hideLoading();
      showSuccessFlash();
      showToast('[DEMO] Transaksi ' + tipe + ' qty ' + qty + ' berhasil', 's');
      notifyWMS({ success: true, tipe, qty, idno_rollawal: foundRoll.idno_rollawal });
      setTimeout(resetForNextScan, 3000);
    }, 700);
    return;
  }

  // Kirim ke Apps Script via URL parameter
  const params = new URLSearchParams({
    action:        'processTransaction',
    idno_rollawal: foundRoll.idno_rollawal,
    tipe:          tipe,
    qty:           qty,
    pic:           pic,
    keterangan:    'Via Scanner HP'
  });

  fetch(WMS_URL + '?' + params.toString(), { method: 'GET', redirect: 'follow' })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      hideLoading();
      if (data && data.success) {
        showSuccessFlash();
        showToast(data.message || 'Transaksi ' + tipe + ' berhasil!', 's');

        // Update stok di card
        if (data.stok_after !== undefined) {
          foundRoll.stok_saat_ini = data.stok_after;
          document.getElementById('resultMeta').textContent =
            'Stok: ' + data.stok_after +
            '  |  Roll: ' + (foundRoll.no_rollawal || '-') +
            '  |  Size: ' + (foundRoll.size_mtrl || '-');
        }

        // Kirim notif ke WMS (jika dibuka via window.open)
        notifyWMS({ success: true, tipe, qty, idno_rollawal: foundRoll.idno_rollawal });

        // Reset untuk scan berikutnya
        setTimeout(resetForNextScan, 3000);
      } else {
        showToast((data ? data.message : '') || 'Transaksi gagal', 'e');
      }
    })
    .catch(err => {
      hideLoading();
      console.error('Transaction error:', err);
      showToast('Gagal koneksi ke WMS. Coba lagi.', 'e');
    });
}

function resetForNextScan() {
  foundRoll   = null;
  pendingTipe = null;
  document.getElementById('resultCard').className       = 'result-card';
  document.getElementById('btnRow').style.display       = 'none';
  document.getElementById('manualInput').value          = '';
}

// ============================================================
// KOMUNIKASI KE WMS (jika dibuka via window.open dari WMS)
// ============================================================
function notifyWMS(data) {
  try {
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ source: 'wms-scanner', ...data }, '*');
    }
  } catch (e) {
    console.warn('postMessage failed:', e);
  }
}

// ============================================================
// UTILS
// ============================================================
function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'Memproses...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
function setStatus(state) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
}
function showToast(msg, type) {
  const wrap = document.getElementById('toastWrap');
  const t    = document.createElement('div');
  const icons = { s: '&#10003;', e: '&#9888;', w: '&#9432;' };
  t.className = 'toast ' + (type || 's');
  t.innerHTML = '<span>' + (icons[type] || '') + '</span><span>' + msg + '</span>';
  wrap.appendChild(t);
  setTimeout(() => {
    t.style.opacity    = '0';
    t.style.transition = 'opacity .3s';
    setTimeout(() => t.remove(), 300);
  }, 3500);
}
</script>
